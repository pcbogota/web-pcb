function Get-CenteredText {
	param(
		[Parameter(Mandatory = $true)]
		[string]$Text,
		[switch]$SidePadding
	)

	$padding = ' ' * [math]::Max(0, (([console]::WindowWidth - (($Text.length) + 1)) / 2))
	if ($SidePadding) { return $padding } else { return "$padding$text$padding" }

}
