         id="tspan56">nombre de archivo (preferiblemente que incluya la ruta de preparación o la de assets):</tspan><tspan
         sodipodi:role="line"
         x="266.01758"
         y="168.63672"
         id="tspan53">c:\Ruta\png_icon</tspan><tspan
         sodipodi:role="line"
         x="266.01758"
         y="183.63672"
         id="tspan31" /><tspan
         sodipodi:role="line"
         x="266.01758"
         y="198.63672"
         id="tspan16">En GIMP el lienzo debe ser de 256px.</tspan><tspan
         sodipodi:role="line"
         x="266.01758"
         y="213.63672"
         id="tspan14">Asegurarse que el primer archivo para abrir sea el de 256.</tspan><tspan
         sodipodi:role="line"
         x="266.01758"
         y="228.63672"
         id="tspan166">Organizar de mayor a menor las capas</tspan><tspan
